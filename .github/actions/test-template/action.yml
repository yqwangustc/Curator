name: "Test Template"
description: "Template for running NeMo tests in a containerized environment"

inputs:
  timeout:
    description: "Max runtime of test in minutes"
    required: false
    default: "10"
  script:
    description: "Test script to execute"
    required: true
  is_optional:
    description: "Failure will cancel all other tests if set to true"
    required: false
    default: "false"
  is_unit_test:
    description: "Upload coverage as unit test"
    required: false
    default: "false"
  cpu-only:
    description: "Run tests on CPU only"
    required: false
    default: "false"
  HF_TOKEN:
    description: "Hugging Face Token"
    required: true
  PAT:
    description: "GitHub Personal Access Token"
    required: true
  test-data-path:
    description: "Test data path"
    required: true
  runner:
    description: "Runner to use"
    required: true
  container-image:
    description: "Container image to use for test"
    required: true
  gpu-test-extras:
    description: "Space-separated UV extras to install for GPU tests (e.g. deduplication_cuda12 text_cpu)"
    required: false
    default: ""
  gpu-test-paths:
    description: "Space-separated test paths for GPU tests"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install uuidgen
      shell: bash -x -e -u -o pipefail {0}
      if: ${{ contains(inputs.runner, 'aws') }}
      run: |
        for i in 1 2 3; do
          apt-get update && apt-get install -y uuid-runtime && break
          echo "Attempt $i failed, retrying in 10s..."
          sleep 10
        done

    - name: Start container
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.HF_TOKEN }}
      run: |
        ARG=("")
        if [[ "${{ inputs.cpu-only }}" == "false" ]]; then
          ARG=("--runtime=nvidia --gpus all")
        fi

        cmd=$(cat <<RUN_TEST_EOF
        #!/bin/bash
        docker container rm -f nemo_container_${{ github.run_id }} || true
        docker run \
          --rm \
          -d \
          --name nemo_container_${{ github.run_id }} ${ARG[@]} \
          --shm-size=64g \
          --env HF_TOKEN=${HF_TOKEN} \
          --env RUN_ID=${{ github.run_id }} \
          --workdir /opt/Curator \
          --volume ${{ inputs.test-data-path }}:/home/TestData \
          ${{ inputs.container-image }} \
          bash -c "sleep $(( ${{ inputs.timeout }} * 60 + 60 ))"
        RUN_TEST_EOF
        )

        echo "$cmd" | tee "retry_job.sh"
        bash retry_job.sh

    - name: Create run-script
      id: create
      shell: bash
      run: |
        COVERAGE_PREFIX=$([[ "${{ inputs.is_unit_test }}" == "true" ]] && echo "unit-test" || echo "e2e")
        echo "coverage-prefix=$COVERAGE_PREFIX" | tee -a "$GITHUB_OUTPUT"

        cmd=$(cat <<'RUN_TEST_EOF'
        #!/bin/bash

        docker exec -t nemo_container_${{ github.run_id }} bash -c '
          set -e

          . /opt/venv/env.sh
          GPU_TEST_EXTRAS="${{ inputs.gpu-test-extras }}" \
          GPU_TEST_PATHS="${{ inputs.gpu-test-paths }}" \
          bash tests/${{ inputs.script }}.sh
        '

        RUN_TEST_EOF
        )

        echo "timeout_in_seconds=$(( ${{ inputs.timeout }} * 60 ))" | tee -a "$GITHUB_OUTPUT"
        echo "$cmd" | tee "job.sh"

    - name: Run main script
      uses: nick-fields/retry@v3
      id: run-main-script
      with:
        timeout_seconds: ${{ steps.create.outputs.timeout_in_seconds }}
        max_attempts: 3
        shell: bash
        retry_on: timeout
        command: /bin/bash job.sh
        on_retry_command: /bin/bash retry_job.sh

    - name: Check result
      id: check
      shell: bash
      run: |
        docker exec nemo_container_${{ github.run_id }} bash -c 'cd /opt/Curator && coverage combine' || true
        docker exec nemo_container_${{ github.run_id }} bash -c 'cd /opt/Curator && coverage xml' || true
        docker cp nemo_container_${{ github.run_id }}:/opt/Curator/.coverage .coverage
        docker cp nemo_container_${{ github.run_id }}:/opt/Curator/coverage.xml coverage.xml

        coverage_report=coverage-${{ steps.create.outputs.coverage-prefix }}-${{ github.run_id }}-$(uuidgen)
        echo "coverage_report=$coverage_report" >> "$GITHUB_OUTPUT"

        EXIT_CODE=${{ steps.run-main-script.outputs.exit_code }}
        IS_SUCCESS=$([[ "$EXIT_CODE" -eq 0 ]] && echo "true" || echo "false")

        if [[ "$IS_SUCCESS" == "false" && "${{ inputs.is_optional }}" == "true" ]]; then
          echo "::warning:: Test failed, but displayed as successful because it is marked as optional."
          IS_SUCCESS=true
        fi

        if [[ "$IS_SUCCESS" == "false" ]]; then
          echo Test did not finish successfully.
          exit 1
        fi

        exit $EXIT_CODE

    - name: Test coverage
      shell: bash -x -e -u -o pipefail {0}
      run: |
        docker exec -t nemo_container_${{ github.run_id }} bash -c 'cd /opt/Curator && coverage report -i'

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      if: ${{ steps.check.outputs.coverage_report != 'none' }}
      with:
        name: ${{ steps.check.outputs.coverage_report }}
        path: |
          coverage.xml
          .coverage
        include-hidden-files: true
