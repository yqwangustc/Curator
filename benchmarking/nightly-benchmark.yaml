# The "paths" section defines files and directories used by the benchmarks.
# Each entry requires a "name" and a "host_path". Paths must exist on the host.
# If running inside a Docker container started with tools/run.sh, each path is
# automatically mounted into the container. An optional "container_path" overrides
# the default mount point (default is host_path prefixed with "/MOUNT").
# The "name" can be used as a placeholder elsewhere in this file
# (e.g. {datasets_path}) and will be substituted with either host_path or
# container_path based on the environment.
paths:
  - name: "datasets_path"
    host_path: "/path/to/datasets"
    container_path: "/datasets"
  - name: "model_weights_path"
    host_path: "/path/to/model_weights"
    container_path: "/model_weights"
  - name: "results_path"
    host_path: "/path/where/results/are/stored"
    # container_path will default to "/MOUNT/path/where/results/are/stored".

# The following path variables are deprecated. They will still work but will produce a warning.
# Use the "paths" section above instead. These will be removed in a future release.
#
# results_path: "/path/where/results/are/stored"
# datasets_path: "/path/to/datasets"
# model_weights_path: "/path/to/model_weights"

datasets:
  - name: "tinystories"
    formats:
    - type: "parquet"
      path: "{datasets_path}/tinystories/parquet_data"
    - type: "jsonl"
      path: "{datasets_path}/tinystories/jsonl_data"
  - name: "commoncrawl"
    formats:
    - type: "jsonl"
      path: "{datasets_path}/commoncrawl/jsonl_data"
    - type: "parquet_gemma_embeddings"
      path: "{datasets_path}/cleaned_exact_dedup_all_cc_gemma_embeddings"
  - name: "commoncrawl_id_map"
    formats:
    - type: "json"
      path: "{datasets_path}/commoncrawl/id_generator.json"
  - name: "commoncrawl_ids"
    formats:
    - type: "parquet"
      path: "{datasets_path}/commoncrawl/IDs/parquet_data"
  - name: "mscoco"
    formats:
    - type: "wds"
      path: "{datasets_path}/mscoco/wds/truncated_100K_mscoco_benchmarking"
  - name: "mscoco_model_weights"
    formats:
    - type: "files"
      path: "{datasets_path}/mscoco/model_weights"
  - name: "videos"
    formats:
    - type: "mp4"
      path: "{datasets_path}/videos"
  - name: "videos_model_weights"
    formats:
    - type: "files"
      path: "{datasets_path}/video_model_weights"
  - name: "rpv2-2023-14-en"
    formats:
    - type: "parquet"
      path: "{datasets_path}/rpv2_2023-14_en"
  - name: "arxiv_downloads"
    formats:
    - type: "tar"
      path: "{datasets_path}/arxiv_downloads"
  - name: "fasttext_langid_model"
    formats:
    - type: "bin"
      path: "{model_weights_path}/fasttext/lid.176.bin"
    - type: "ftz"
      path: "{model_weights_path}/fasttext/lid.176.ftz"
  - name: "fasttext_quality_model"
    formats:
    - type: "bin"
      path: "{model_weights_path}/fasttext/model.bin"
  - name: "gretel_symptoms"
    formats:
    - type: "jsonl"
      path: "{datasets_path}/gretel_symptoms"
  - name: "text_models_hf_cache"
    formats:
    - type: "files"
      path: "{model_weights_path}/text_models_hf_cache"
  - name: "multimodal_mint1t"
    formats:
    - type: "wds_tar_dir"
      path: "{datasets_path}/multimodal/mint1t"
  - name: "finemath4plus"
    formats:
    - type: "parquet"
      path: "{datasets_path}/finemath4plus/enriched"
  - name: "cc_index_query_dataset"
    formats:
    - type: "parquet"
      path: "{datasets_path}/cc_index_benchmark/dataset/megamath_web/megamath-web"
  - name: "cc_index_partitions"
    formats:
    - type: "parquet"
      path: "{datasets_path}/cc_index_benchmark/cc_index"
  - name: "read_speech"
    formats:
    - type: "wav"
      path: "{datasets_path}/read_speech"
default_timeout_s: 7200

# Optional sinks
sinks:
#  - name: mlflow
#    enabled: false
#    tracking_uri: ${MLFLOW_TRACKING_URI}
#    experiment: ray-curator-common-crawl
  - name: slack
    enabled: true
    live_updates: true
    channel_id: ${SLACK_CHANNEL_ID}
    default_metrics: ["exec_time_s"]
#  - name: gdrive
#    enabled: false
#    drive_folder_id: ${GDRIVE_FOLDER_ID}
#    service_account_file: ${GDRIVE_SERVICE_ACCOUNT_FILE}

# Whether to delete scratch dirs after each run
delete_scratch: true

# The size of the object store used by Ray which can be either a value in bytes (int), or
# a fraction of total system memory (float), or the value "default" (string) which allows
# for "ray start" to determine object store size.
object_store_size: 536870912000  # 500GB

# Global ray settings inherited by all entries. Per-entry ray sections override these values.
ray:
  num_cpus: 64
  num_gpus: 4
  enable_object_spilling: false

entries:
  - name: domain_classification_raydata
    enabled: true
    script: domain_classification_benchmark.py
    args: >-
      --benchmark-results-path={session_entry_dir}
      --output-path={session_entry_dir}/scratch/output
      --executor=ray_data
      --input-path={dataset:tinystories,parquet}
      --dataset-size-gb=10
      --model-inference-batch-size=1024
    timeout_s: 1000
    sink_data:
      - name: slack
        # Additional metrics to include in the Slack report.  These must be present in the metrics.json file generated by the script.
        additional_metrics:
          - throughput_docs_per_sec
          - number_of_domains_predicted
        ping_on_failure:
          - U022P8CDX40  # Sarah Yurick

    requirements:
      # Observed throughput of 2700 docs/sec so we allow a 5% buffer to account for variability
      - metric: throughput_docs_per_sec
        min_value: 2565
      - metric: number_of_domains_predicted
        exact_value: 26
      # We choose two domains randomly and ensure that the counts are as expected
      - metric: domain_label_games_count
        exact_value: 149816
      - metric: domain_label_news_count
        exact_value: 2817

